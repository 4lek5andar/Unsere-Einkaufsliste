<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien-Liste</title>
    <style>
        :root { --primary: #4CAF50; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: white; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; font-size: 1.5rem; font-weight: bold; }
        
        .input-group { display: flex; padding: 10px; gap: 5px; position: sticky; top: 0; background: white; z-index: 10; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; } /* 16px verhindert Auto-Zoom auf iOS */
        button#add-btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; transition: background 0.2s; }
        li.checked { background: #f9f9f9; text-decoration: line-through; color: #888; }
        .item-text { flex: 1; font-size: 1.1rem; cursor: pointer; }
        .delete-btn { color: #ff5252; border: none; background: none; padding: 5px 10px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="app-container">
    <header>Einkaufsliste</header>
    
    <div class="input-group">
        <input type="text" id="item-input" placeholder="Milch, Eier..." autofocus>
        <button id="add-btn">+</button>
    </div>

    <ul id="shopping-list"></ul>
</div>

<script>
    const input = document.getElementById('item-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('shopping-list');

    // Laden beim Start
    let items = JSON.parse(localStorage.getItem('shopping-items')) || [];
    render();

    function render() {
        list.innerHTML = '';
        items.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = item.checked ? 'checked' : '';
            li.innerHTML = `
                <span class="item-text" onclick="toggleItem(${index})">${item.text}</span>
                <button class="delete-btn" onclick="deleteItem(${index})">×</button>
            `;
            list.appendChild(li);
        });
        localStorage.setItem('shopping-items', JSON.stringify(items));
    }

    function addItem() {
        if (input.value.trim() === "") return;
        items.unshift({ text: input.value, checked: false });
        input.value = '';
        render();
    }

    window.toggleItem = (index) => {
        items[index].checked = !items[index].checked;
        render();
    };

    window.deleteItem = (index) => {
        items.splice(index, 1);
        render();
    };

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') addItem(); });
</script>

</body>
</html>

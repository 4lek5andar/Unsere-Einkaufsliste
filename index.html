<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien Liste</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3144/3144456.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3144/3144456.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root { --primary: #4CAF50; --bg: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 500px; background: white; min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .input-area { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
        #list-content { padding: 10px; }
        .item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .delete-btn { color: #ff5252; background: none; font-weight: bold; }
        .error-box { background: #ffeded; color: #d32f2f; padding: 15px; margin: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div id="app-container">
        <header><h1>🛒 FAMILIEN LISTE</h1></header>
        
        <div id="error-display" class="error-box"></div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="item-input" placeholder="Was fehlt uns?">
                <button id="add-btn">Hinzufügen</button>
            </div>
        </div>

        <div id="list-content">Lade Daten...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Sicherheits-Check: Falls Firebase nicht lädt
        window.onerror = function(msg) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML = "Fehler beim Laden: " + msg;
        };

        const firebaseConfig = {
            apiKey: "AIzaSyAHXdu0nscpjeZ-hD4aZGctADhr8dVnpy0",
            authDomain: "familienliste-292c8.firebaseapp.com",
            projectId: "familienliste-292c8",
            storageBucket: "familienliste-292c8.firebasestorage.app",
            messagingSenderId: "27172030104",
            appId: "1:27172030104:web:ec55b4f4b8e4c07373f2ed"
        };

        // Firebase Initialisierung
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const colRef = db.collection("shoppingList");

        const input = document.getElementById('item-input');
        const listContent = document.getElementById('list-content');

        // Funktion zum Speichern
        async function save() {
            const val = input.value.trim();
            if(!val) return;
            try {
                await colRef.add({
                    text: val,
                    checked: false,
                    createdAt: Date.now()
                });
                input.value = '';
            } catch (e) {
                alert("Fehler beim Speichern: " + e.message);
            }
        }

        document.getElementById('add-btn').onclick = save;

        // Echtzeit-Update der Liste
        colRef.orderBy("createdAt", "desc").onSnapshot((snap) => {
            listContent.innerHTML = '';
            if(snap.empty) {
                listContent.innerHTML = '<p style="text-align:center; color:#999;">Die Liste ist leer.</p>';
                return;
            }
            snap.forEach(doc => {
                const item = doc.data();
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <span>${item.text}</span>
                    <button class="delete-btn" onclick="deleteItem('${doc.id}')">Löschen</button>
                `;
                listContent.appendChild(div);
            });
        }, (err) => {
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').innerText = "Firebase-Fehler: " + err.message;
        });

        // Global machen für die Buttons
        window.deleteItem = function(id) {
            colRef.doc(id).delete();
        };
    </script>
</body>
</html>

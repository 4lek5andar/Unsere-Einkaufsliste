<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien Liste</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3144/3144456.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3144/3144456.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --primary: #4CAF50; --bg: #f4f7f6; --color-sonst: #607d8b; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 500px; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .input-area { padding: 15px; border-bottom: 1px solid #eee; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 2px solid #f0f0f0; border-radius: 10px; font-size: 16px; outline: none; }
        button#add-btn { padding: 0 20px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 24px; }
        #list-content { flex: 1; }
        .cat-header { padding: 8px 15px; font-size: 0.7rem; font-weight: 800; color: white; text-transform: uppercase; background: #607d8b; }
        li { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #f9f9f9; }
        .error-msg { background: #ffeded; color: #d32f2f; padding: 10px; font-size: 0.8rem; display: none; margin: 10px; border-radius: 5px; border: 1px solid red; }
    </style>
</head>
<body>
    <div id="app-container">
        <header><h1>🛒 FAMILIEN LISTE</h1></header>
        <div id="debug-error" class="error-msg"></div>
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="item-input" placeholder="Was fehlt uns?">
                <button id="add-btn">+</button>
            </div>
        </div>
        <div id="list-content">Lade...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHXdu0nscpjeZ-hD4aZGctADhr8dVnpy0",
            authDomain: "familienliste-292c8.firebaseapp.com",
            projectId: "familienliste-292c8",
            storageBucket: "familienliste-292c8.firebasestorage.app",
            messagingSenderId: "27172030104",
            appId: "1:27172030104:web:ec55b4f4b8e4c07373f2ed"
        };

        const showError = (msg) => {
            const el = document.getElementById('debug-error');
            el.style.display = 'block';
            el.innerText = "HINWEIS: " + msg;
        };

        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const colRef = db.collection("shoppingList");

            document.getElementById('add-btn').onclick = async () => {
                const val = document.getElementById('item-input').value.trim();
                if(!val) return;
                try {
                    await colRef.add({ text: val, category: "Sonstiges", createdAt: Date.now() });
                    document.getElementById('item-input').value = '';
                } catch (e) {
                    showError("Schreibfehler: " + e.message);
                }
            };

            colRef.onSnapshot(snap => {
                const list = document.getElementById('list-content');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const item = doc.data();
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${item.text}</span><button onclick="deleteItem('${doc.id}')" style="border:none; background:none; color:#ccc;">✕</button>`;
                    list.appendChild(li);
                });
                if(snap.empty) list.innerHTML = '<p style="text-align:center;color:#ccc;margin-top:20px;">Liste leer</p>';
            }, err => showError("Lesefehler: " + err.message));

            window.deleteItem = (id) => colRef.doc(id).delete().catch(e => showError(e.message));

        } catch (err) {
            showError("Startfehler: " + err.message);
        }
    </script>
</body>
</html>

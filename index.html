<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien Liste 🛒</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3514/3514491.png">

    <style>
        :root { 
            --primary: #4CAF50; --bg: #f4f7f6; --danger: #ff5252; 
            /* Kategorien-Farben */
            --color-obst: #4caf50; --color-kuehl: #2196f3; --color-vorrat: #ff9800;
            --color-back: #795548; --color-getraenke: #00bcd4; --color-drogerie: #9c27b0;
            --color-tk: #03a9f4; --color-sonst: #607d8b;
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 500px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; }
        h1 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }
        #clear-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; margin-top: 8px; cursor: pointer; text-transform: uppercase; }

        .input-area { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary); }
        button#add-btn { padding: 0 22px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 26px; cursor: pointer; }
        
        .category-select { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .category-select::-webkit-scrollbar { display: none; }
        .cat-chip { padding: 7px 14px; background: #f0f0f0; border-radius: 20px; font-size: 0.75rem; white-space: nowrap; cursor: pointer; border: 2px solid transparent; color: #666; transition: all 0.2s; }
        .cat-chip.active { color: white; font-weight: bold; }
        
        /* Chip-Farben im aktiven Zustand */
        .cat-chip[data-cat="Obst & Gemüse"].active { background: var(--color-obst); }
        .cat-chip[data-cat="Kühlregal"].active { background: var(--color-kuehl); }
        .cat-chip[data-cat="Vorrat"].active { background: var(--color-vorrat); }
        .cat-chip[data-cat="Backwaren"].active { background: var(--color-back); }
        .cat-chip[data-cat="Getränke"].active { background: var(--color-getraenke); }
        .cat-chip[data-cat="Drogerie"].active { background: var(--color-drogerie); }
        .cat-chip[data-cat="Tiefkühl"].active { background: var(--color-tk); }
        .cat-chip[data-cat="Sonstiges"].active { background: var(--color-sonst); }

        /* Kategorie Header Design */
        .category-header { 
            padding: 8px 15px; font-size: 0.75rem; font-weight: 800; color: white; 
            text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;
        }
        .head-obst { background: var(--color-obst); }
        .head-kuehl { background: var(--color-kuehl); }
        .head-vorrat { background: var(--color-vorrat); }
        .head-back { background: var(--color-back); }
        .head-getraenke { background: var(--color-getraenke); }
        .head-drogerie { background: var(--color-drogerie); }
        .head-tk { background: var(--color-tk); }
        .head-sonst { background: var(--color-sonst); }
        .head-done { background: #ccc; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { 
            display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f1f1f1; 
            background: white; border-left: 5px solid transparent;
        }
        
        /* Akzentstreifen links */
        li.cat-obst { border-left-color: var(--color-obst); }
        li.cat-kuehl { border-left-color: var(--color-kuehl); }
        li.cat-vorrat { border-left-color: var(--color-vorrat); }
        li.cat-back { border-left-color: var(--color-back); }
        li.cat-getraenke { border-left-color: var(--color-getraenke); }
        li.cat-drogerie { border-left-color: var(--color-drogerie); }
        li.cat-tk { border-left-color: var(--color-tk); }
        li.cat-sonst { border-left-color: var(--color-sonst); }

        .item-text { flex: 1; cursor: pointer; font-size: 1.1rem; color: #333; }
        .checked { opacity: 0.4; background: #f9f9f9; border-left-color: #ccc !important; }
        .checked .item-text { text-decoration: line-through; }
        
        .delete-btn { color: #ccc; background: none; border: none; font-size: 1.2rem; padding: 0 5px; cursor: pointer; transition: color 0.2s; }
        .delete-btn:hover { color: var(--danger); }
        .status-msg { padding: 50px 20px; text-align: center; color: #aaa; font-style: italic; }
    </style>
</head>
<body>
    <div id="app-container">
        <header>
            <h1>🛒 FAMILIEN LISTE</h1>
            <button id="clear-btn">Erledigte löschen 🧹</button>
        </header>
        
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="item-input" placeholder="Was brauchen wir?" autocomplete="off">
                <button id="add-btn">+</button>
            </div>
            <div class="category-select" id="cat-chips"></div>
        </div>
        
        <div id="list-content">
            <div class="status-msg">Lade Liste...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHXdu0nscpjeZ-hD4aZGctADhr8dVnpy0",
            authDomain: "familienliste-292c8.firebaseapp.com",
            projectId: "familienliste-292c8",
            storageBucket: "familienliste-292c8.firebasestorage.app",
            messagingSenderId: "27172030104",
            appId: "1:27172030104:web:ec55b4f4b8e4c07373f2ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "shoppingList");

        const categories = {
            "Obst & Gemüse": { class: "obst", words: ["apfel", "banane", "tomate", "gurke", "salat", "kartoffel", "obst", "gemüse", "beeren", "zwiebel", "orange", "zitrone", "paprika", "lauch", "brokkoli", "möhre", "karotte", "avocado", "weintrauben", "kiwi", "birne", "knoblauch", "ingwer", "pilze", "kohl", "spinat", "ananas", "melone"] },
            "Kühlregal": { class: "kuehl", words: ["milch", "käse", "joghurt", "quark", "butter", "eier", "wurst", "schinken", "sahne", "milchschnitte", "hummus", "hefe", "frischkäse", "mozzarella", "fleisch", "hähnchen", "hackfleisch", "fisch", "tofu", "vegan"] },
            "Vorrat": { class: "vorrat", words: ["nudeln", "preis", "mehl", "zucker", "kaffee", "tee", "öl", "konserve", "gewürz", "haferflocken", "chips", "schokolade", "kekse", "spaghetti", "tomatensauce", "backpulver", "honig", "nutella", "müsli", "salz", "pfeffer", "essig"] },
            "Backwaren": { class: "back", words: ["brot", "brötchen", "toast", "kuchen", "brezel", "baguette", "croissant", "pizzateig"] },
            "Getränke": { class: "getraenke", words: ["wasser", "saft", "bier", "wein", "cola", "limo", "sprudel", "schorle", "energy", "eistee", "mineralwasser"] },
            "Drogerie": { class: "drogerie", words: ["klopapier", "seife", "shampoo", "zahnpasta", "windeln", "putzmittel", "deo", "duschgel", "taschentücher", "waschmittel", "spülmittel", "küchenrolle", "zahnbürste"] },
            "Tiefkühl": { class: "tk", words: ["pizza", "pommes", "eis", "fischstäbchen", "fertiggericht", "tk", "eiswürfel"] },
            "Sonstiges": { class: "sonst", words: [] }
        };

        const emojiMap = { 'milch': '🥛', 'brot': '🍞', 'eier': '🥚', 'käse': '🧀', 'apfel': '🍎', 'orange': '🍊', 'banane': '🍌', 'gemüse': '🥦', 'bier': '🍺', 'pizza': '🍕', 'klopapier': '🧻' };

        let selectedCategory = "Sonstiges";
        const input = document.getElementById('item-input');
        const addBtn = document.getElementById('add-btn');
        const listContent = document.getElementById('list-content');
        const catChipsContainer = document.getElementById('cat-chips');

        // Chips mit Daten-Attribut für CSS Farben
        Object.keys(categories).forEach(cat => {
            const chip = document.createElement('div');
            chip.className = `cat-chip ${cat === "Sonstiges" ? "active" : ""}`;
            chip.innerText = cat;
            chip.setAttribute('data-cat', cat);
            chip.onclick = () => {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selectedCategory = cat;
            };
            catChipsContainer.appendChild(chip);
        });

        input.oninput = () => {
            const val = input.value.toLowerCase();
            if (val === "") return;
            for (const [cat, data] of Object.entries(categories)) {
                if (data.words.some(k => val.includes(k))) {
                    selectedCategory = cat;
                    document.querySelectorAll('.cat-chip').forEach(c => {
                        c.classList.toggle('active', c.getAttribute('data-cat') === cat);
                    });
                    break;
                }
            }
        };

        const q = query(colRef, orderBy("checked", "asc"), orderBy("category", "asc"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            listContent.innerHTML = '';
            if (snapshot.empty) {
                listContent.innerHTML = '<div class="status-msg">Die Liste ist leer. <br>Zeit für einen Großeinkauf! 🛒</div>';
                return;
            }

            let currentCat = "";
            let currentUl = null;

            snapshot.docs.forEach(docSnap => {
                const item = docSnap.data();
                const cat = item.category || "Sonstiges";
                const catClass = categories[cat] ? categories[cat].class : "sonst";

                if (cat !== currentCat && !item.checked) {
                    currentCat = cat;
                    const head = document.createElement('div');
                    head.className = `category-header head-${catClass}`;
                    head.innerText = cat;
                    listContent.appendChild(head);
                    currentUl = document.createElement('ul');
                    listContent.appendChild(currentUl);
                } else if (item.checked && currentCat !== "Erledigt") {
                    currentCat = "Erledigt";
                    const head = document.createElement('div');
                    head.className = 'category-header head-done';
                    head.innerText = "Abgehakt ✅";
                    listContent.appendChild(head);
                    currentUl = document.createElement('ul');
                    listContent.appendChild(currentUl);
                }

                const li = document.createElement('li');
                li.className = `cat-${catClass}`;
                if(item.checked) li.classList.add('checked');
                li.innerHTML = `<span class="item-text">${item.text}</span><button class="delete-btn">✕</button>`;
                
                li.querySelector('.item-text').onclick = () => updateDoc(doc(db, "shoppingList", docSnap.id), { checked: !item.checked });
                li.querySelector('.delete-btn').onclick = () => deleteDoc(doc(db, "shoppingList", docSnap.id));
                currentUl.appendChild(li);
            });
        });

        async function addItem() {
            const rawText = input.value.trim();
            if (rawText === "") return;
            let icon = "";
            for (const [key, value] of Object.entries(emojiMap)) {
                if (rawText.toLowerCase().includes(key)) { icon = value + " "; break; }
            }
            await addDoc(colRef, { text: icon + rawText, checked: false, category: selectedCategory, createdAt: Date.now() });
            input.value = '';
            // Reset Chips
            selectedCategory = "Sonstiges";
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.getAttribute('data-cat') === "Sonstiges"));
        }

        document.getElementById('clear-btn').onclick = async () => {
            if (!confirm("Alle abgehakten Artikel löschen?")) return;
            const qChecked = query(colRef, where("checked", "==", true));
            const snapshot = await getDocs(qChecked);
            snapshot.forEach(d => deleteDoc(doc(db, "shoppingList", d.id)));
        };

        addBtn.onclick = addItem;
        input.onkeypress = (e) => { if(e.key === 'Enter') addItem(); };
    </script>
</body>
</html>

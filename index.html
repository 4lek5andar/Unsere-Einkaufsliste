<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien Liste</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        #app-container { max-width: 500px; margin: auto; background: white; min-height: 100vh; }
        header { background: #4CAF50; color: white; padding: 1rem; text-align: center; }
        .input-area { display: flex; padding: 10px; gap: 5px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button#add-btn { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; font-size: 1.1rem; }
        .item-text { flex: 1; cursor: pointer; }
        .checked .item-text { text-decoration: line-through; color: #888; }
        .delete-btn { color: #ff5252; background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>
    <div id="app-container">
        <header><h1>Einkaufsliste</h1></header>
        <div class="input-area">
            <input type="text" id="item-input" placeholder="Was brauchen wir?">
            <button id="add-btn">+</button>
        </div>
        <ul id="shopping-list"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHXdu0nscpjeZ-hD4aZGctADhr8dVnpy0",
            authDomain: "familienliste-292c8.firebaseapp.com",
            projectId: "familienliste-292c8",
            storageBucket: "familienliste-292c8.firebasestorage.app",
            messagingSenderId: "27172030104",
            appId: "1:27172030104:web:ec55b4f4b8e4c07373f2ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "shoppingList");

        const input = document.getElementById('item-input');
        const addBtn = document.getElementById('add-btn');
        const listElement = document.getElementById('shopping-list');

        const q = query(colRef, orderBy("checked", "asc"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            listElement.innerHTML = '';
            snapshot.docs.forEach(docSnap => {
                const item = docSnap.data();
                const id = docSnap.id;
                const li = document.createElement('li');
                if(item.checked) li.classList.add('checked');
                
                li.innerHTML = `
                    <span class="item-text">${item.text}</span>
                    <button class="delete-btn">×</button>
                `;

                li.querySelector('.item-text').onclick = () => {
                    updateDoc(doc(db, "shoppingList", id), { checked: !item.checked });
                };

                li.querySelector('.delete-btn').onclick = () => {
                    deleteDoc(doc(db, "shoppingList", id));
                };

                listElement.appendChild(li);
            });
        }, (error) => {
            console.error("Firebase Fehler:", error);
            // Kleiner Trick: Wenn der Index fehlt, zeigt er uns den Fehler im UI
            if(error.message.includes("index")) {
                listElement.innerHTML = `<li style="color:red; font-size:0.8rem;">Datenbank-Index wird noch erstellt... bitte 1 Min warten.</li>`;
            }
        });

        async function addItem() {
            const text = input.value.trim();
            if (text === "") return;
            input.value = '';
            await addDoc(colRef, {
                text: text,
                checked: false,
                createdAt: Date.now()
            });
        }

        addBtn.onclick = addItem;
        input.onkeypress = (e) => { if(e.key === 'Enter') addItem(); };
    </script>
</body>
</html>

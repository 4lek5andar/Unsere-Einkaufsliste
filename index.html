<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien Liste 🛒</title>
    <style>
        :root { 
            --primary: #4CAF50; --bg: #f4f7f6; --danger: #ff5252; 
            --color-obst: #4caf50; --color-kuehl: #2196f3; --color-vorrat: #ff9800;
            --color-back: #795548; --color-getraenke: #00bcd4; --color-drogerie: #9c27b0;
            --color-tk: #03a9f4; --color-sonst: #607d8b;
        }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 500px; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; }
        h1 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }
        .header-btns { display: flex; justify-content: center; gap: 10px; margin-top: 8px; }
        .action-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        #import-area { display: none; padding: 15px; background: #eee; border-bottom: 2px solid #ddd; }
        #import-textarea { width: 100%; height: 120px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; font-family: inherit; box-sizing: border-box; resize: none; width: 100%; }
        #import-confirm-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; margin-top: 8px; font-weight: bold; cursor: pointer; }
        .input-area { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button#add-btn { padding: 0 22px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 26px; cursor: pointer; }
        .category-select { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .cat-chip { padding: 7px 14px; background: #f0f0f0; border-radius: 20px; font-size: 0.75rem; white-space: nowrap; cursor: pointer; border: 2px solid transparent; color: #666; }
        .cat-chip.active { color: white; font-weight: bold; }
        .cat-chip[data-cat="Obst & Gemüse"].active { background: var(--color-obst); }
        .cat-chip[data-cat="Kühlregal"].active { background: var(--color-kuehl); }
        .cat-chip[data-cat="Vorrat"].active { background: var(--color-vorrat); }
        .cat-chip[data-cat="Backwaren"].active { background: var(--color-back); }
        .cat-chip[data-cat="Getränke"].active { background: var(--color-getraenke); }
        .cat-chip[data-cat="Drogerie"].active { background: var(--color-drogerie); }
        .cat-chip[data-cat="Tiefkühl"].active { background: var(--color-tk); }
        .cat-chip[data-cat="Sonstiges"].active { background: var(--color-sonst); }
        .category-header { padding: 8px 15px; font-size: 0.75rem; font-weight: 800; color: white; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        .head-obst { background: var(--color-obst); }
        .head-kuehl { background: var(--color-kuehl); }
        .head-vorrat { background: var(--color-vorrat); }
        .head-back { background: var(--color-back); }
        .head-getraenke { background: var(--color-getraenke); }
        .head-drogerie { background: var(--color-drogerie); }
        .head-tk { background: var(--color-tk); }
        .head-sonst { background: var(--color-sonst); }
        .head-done { background: #ccc; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f1f1f1; background: white; border-left: 5px solid transparent; }
        li.cat-obst { border-left-color: var(--color-obst); }
        li.cat-kuehl { border-left-color: var(--color-kuehl); }
        li.cat-vorrat { border-left-color: var(--color-vorrat); }
        li.cat-back { border-left-color: var(--color-back); }
        li.cat-getraenke { border-left-color: var(--color-getraenke); }
        li.cat-drogerie { border-left-color: var(--color-drogerie); }
        li.cat-tk { border-left-color: var(--color-tk); }
        li.cat-sonst { border-left-color: var(--color-sonst); }
        .item-text-wrapper { flex: 1; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .amount-badge { background: #f0f0f0; color: #666; font-size: 0.75rem; font-weight: bold; padding: 2px 8px; border-radius: 6px; border: 1px solid #ddd; }
        .item-name { font-size: 1.1rem; color: #333; }
        .checked { opacity: 0.4; background: #f9f9f9; border-left-color: #ccc !important; }
        .checked .item-name { text-decoration: line-through; }
        .delete-btn { color: #ccc; background: none; border: none; font-size: 1.2rem; padding: 0 5px; cursor: pointer; }
        .status-msg { padding: 50px 20px; text-align: center; color: #aaa; }
    </style>
</head>
<body>
    <div id="app-container">
        <header>
            <h1>🛒 FAMILIEN LISTE</h1>
            <div class="header-btns">
                <button class="action-btn" id="toggle-import">Import 📋</button>
                <button class="action-btn" id="clear-btn">Aufräumen 🧹</button>
            </div>
        </header>
        <div id="import-area">
            <textarea id="import-textarea" placeholder="Liste hier einfügen..."></textarea>
            <button id="import-confirm-btn">Hinzufügen 🚀</button>
        </div>
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="item-input" placeholder="Was brauchen wir?" autocomplete="off">
                <button id="add-btn">+</button>
            </div>
            <div class="category-select" id="cat-chips"></div>
        </div>
        <div id="list-content"><div class="status-msg">Verbinde mit Cloud...</div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHXdu0nscpjeZ-hD4aZGctADhr8dVnpy0",
            authDomain: "familienliste-292c8.firebaseapp.com",
            projectId: "familienliste-292c8",
            storageBucket: "familienliste-292c8.firebasestorage.app",
            messagingSenderId: "27172030104",
            appId: "1:27172030104:web:ec55b4f4b8e4c07373f2ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "shoppingList");

        const categories = {
            "Obst & Gemüse": { class: "obst", words: ["apfel", "banane", "tomate", "gurke", "salat", "kartoffel", "obst", "gemüse", "beeren", "zwiebel", "orange", "zitrone", "paprika", "lauch", "brokkoli", "möhre", "karotte", "avocado", "rucola", "weintrauben", "kiwi", "birne", "knoblauch", "ingwer", "pilze", "kohl", "spinat", "ananas", "melone"] },
            "Kühlregal": { class: "kuehl", words: ["milch", "lachs", "creme fraiche", "käse", "joghurt", "quark", "butter", "eier", "wurst", "schinken", "sahne", "milchschnitte", "hummus", "hefe", "frischkäse", "mozzarella", "fleisch", "hähnchen", "hackfleisch", "fisch", "tofu", "vegan"] },
            "Vorrat": { class: "vorrat", words: ["nudeln", "mehl", "zucker", "kaffee", "tee", "öl", "konserve", "gewürz", "haferflocken", "chips", "schokolade", "kekse", "spaghetti", "tomatensauce", "backpulver", "honig", "nutella", "müsli", "salz", "pfeffer", "essig"] },
            "Backwaren": { class: "back", words: ["brot", "brötchen", "toast", "kuchen", "brezel", "baguette", "croissant", "pizzateig"] },
            "Getränke": { class: "getraenke", words: ["wasser", "saft", "bier", "wein", "coka-cola", "cola", "limo", "sprudel", "schorle", "energy", "eistee", "mineralwasser"] },
            "Drogerie": { class: "drogerie", words: ["klopapier", "seife", "shampoo", "zahnpasta", "windeln", "putzmittel", "deo", "duschgel", "taschentücher", "waschmittel", "spülmittel", "küchenrolle", "zahnbürste"] },
            "Tiefkühl": { class: "tk", words: ["pizza", "pommes", "eis", "fischstäbchen", "fertiggericht", "tk", "eiswürfel"] },
            "Sonstiges": { class: "sonst", words: [] }
        };


        let selectedCategory = "Sonstiges";
        const input = document.getElementById('item-input');
        const listContent = document.getElementById('list-content');
        const catChipsContainer = document.getElementById('cat-chips');

        // Initialisiere Chips
        Object.keys(categories).forEach(cat => {
            const chip = document.createElement('div');
            chip.className = `cat-chip ${cat === "Sonstiges" ? "active" : ""}`;
            chip.innerText = cat;
            chip.setAttribute('data-cat', cat);
            chip.onclick = () => {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selectedCategory = cat;
            };
            catChipsContainer.appendChild(chip);
        });

        function extractAmount(text) {
            const regex = /^(\d+[\.,]?\d*\s*(x|g|kg|l|ml|pck|stk|bund|dose|flasche|stück)?\s+)|(\s+\d+[\.,]?\d*\s*(x|g|kg|l|ml|pck|stk|bund|dose|flasche|stück)?)$/i;
            const match = text.match(regex);
            if (match) {
                const amount = match[0].trim();
                const name = text.replace(match[0], "").trim();
                return { amount, name };
            }
            return { amount: null, name: text };
        }

        function getInfo(text) {
            let cat = "Sonstiges";
            let emoji = "";
            const lt = text.toLowerCase();
            for (const [cName, data] of Object.entries(categories)) {
                if (data.words.some(w => lt.includes(w))) { cat = cName; break; }
            }
            for (const [key, val] of Object.entries(emojiMap)) {
                if (lt.includes(key)) { emoji = val + " "; break; }
            }
            return { emoji, cat };
        }

        input.oninput = () => {
            const info = getInfo(input.value);
            selectedCategory = info.cat;
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.getAttribute('data-cat') === info.cat));
        };

        async function save(txt, cat) {
            const info = getInfo(txt);
            await addDoc(colRef, { text: info.emoji + txt, checked: false, category: cat || info.cat, createdAt: Date.now() });
        }

        document.getElementById('add-btn').onclick = async () => {
            if(!input.value.trim()) return;
            await save(input.value.trim(), selectedCategory);
            input.value = '';
        };

        document.getElementById('import-confirm-btn').onclick = async () => {
            const area = document.getElementById('import-textarea');
            const lines = area.value.split('\n').filter(l => l.trim() !== "");
            for (const l of lines) await save(l.trim());
            area.value = '';
            document.getElementById('import-area').style.display = 'none';
        };

        document.getElementById('toggle-import').onclick = () => {
            const a = document.getElementById('import-area');
            a.style.display = a.style.display === 'block' ? 'none' : 'block';
        };

        const q = query(colRef, orderBy("checked", "asc"), orderBy("category", "asc"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            listContent.innerHTML = '';
            let cur = "";
            let ul = null;
            snap.docs.forEach(d => {
                const item = d.data();
                const cat = item.category || "Sonstiges";
                const { amount, name } = extractAmount(item.text);
                if ((cat !== cur && !item.checked) || (item.checked && cur !== "Done")) {
                    cur = item.checked ? "Done" : cat;
                    const h = document.createElement('div');
                    h.className = `category-header ${item.checked ? 'head-done' : 'head-'+categories[cat].class}`;
                    h.innerText = item.checked ? "Erledigt ✅" : cat;
                    listContent.appendChild(h);
                    ul = document.createElement('ul');
                    listContent.appendChild(ul);
                }
                const li = document.createElement('li');
                li.className = `cat-${categories[cat]?.class || 'sonst'} ${item.checked ? 'checked' : ''}`;
                li.innerHTML = `<div class="item-text-wrapper">${amount ? '<span class="amount-badge">'+amount+'</span>':''}<span class="item-name">${name}</span></div><button class="delete-btn">✕</button>`;
                li.querySelector('.item-text-wrapper').onclick = () => updateDoc(doc(db, "shoppingList", d.id), { checked: !item.checked });
                li.querySelector('.delete-btn').onclick = () => deleteDoc(doc(db, "shoppingList", d.id));
                ul.appendChild(li);
            });
        });

        document.getElementById('clear-btn').onclick = async () => {
            if(!confirm("Abgehakte löschen?")) return;
            const snap = await getDocs(query(colRef, where("checked", "==", true)));
            snap.forEach(d => deleteDoc(doc(db, "shoppingList", d.id)));
        };
    </script>
</body>
</html>
